<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campaign Planner — Box Office Film Strategy</title>
<meta name="description" content="Generator strategi konten film Indonesia. Masukkan judul, sinopsis, dan tanggal tayang — dapatkan kampanye lengkap siap Box Office." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0c10;
    --surface: #13141a;
    --surface2: #1a1b23;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f4;
    --muted: #888894;
    --primary: #d1a153;
    --primary-hover: #bfa043;
    --accent: #4eefb2;
    --error: #ff5c5c;
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Inter', sans-serif;
    --font-heading: 'Sora', sans-serif;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.6;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 800px;
  }
  header {
    margin-bottom: 40px;
    text-align: center;
  }
  h1 {
    font-family: var(--font-heading);
    font-size: 2.5rem;
    color: #fff;
    margin-bottom: 8px;
  }
  header p {
    color: var(--muted);
    font-size: 1.1rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
  }
  .form-group {
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: var(--muted);
  }
  input[type="text"], input[type="date"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: #fff;
    font-family: var(--font);
    font-size: 1rem;
    transition: all 0.2s ease;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(209, 161, 83, 0.15);
  }
  textarea {
    resize: vertical;
    min-height: 120px;
  }
  .btn {
    background: var(--primary);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px 24px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn:hover {
    background: var(--primary-hover);
  }
  .loading {
    display: none;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    margin: 20px 0;
  }
  .output-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 32px;
  }
  .output-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .output-title {
    font-family: var(--font-heading);
    font-size: 1.8rem;
    color: #fff;
  }
  .sec-title {
    color: var(--primary);
    font-size: 1.2rem;
    margin: 24px 0 12px 0;
    font-family: var(--font-heading);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 12px;
    text-align: left;
  }
  th {
    background: var(--surface2);
    color: var(--muted);
  }
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border2);
    color: #fff;
  }
  .btn-secondary:hover {
    background: var(--surface2);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Campaign Planner</h1>
    <p>Box Office Film Strategy Generator</p>
  </header>

  <div id="formSection" class="card">
    <div class="form-group">
      <label for="movieTitle">Judul Film</label>
      <input type="text" id="movieTitle" placeholder="Contoh: Dilan 1997 / Ancika" />
    </div>
    
    <div class="form-group">
      <label for="movieSynopsis">Sinopsis</label>
      <textarea id="movieSynopsis" placeholder="Masukkan sinopsis lengkap film di sini..."></textarea>
    </div>

    <div class="form-group">
      <label for="movieCast">Pemain Utama / Cast</label>
      <input type="text" id="movieCast" placeholder="Contoh: Arbani Yasiz (Dilan), Zee JKT48 (Ancika)" />
    </div>

    <div class="form-group">
      <label for="releaseDate">Tanggal Tayang</label>
      <input type="date" id="releaseDate" />
    </div>

    <button class="btn" onclick="generateStrategy()">Generate Campaign Strategy</button>
  </div>

  <div id="loadingSection" class="loading">
    Sedang merumuskan strategi Box Office terbaik untuk film Anda...
  </div>

  <div id="resultsSection" class="output-card"></div>
</div>

<script>
  let generatedPlan = null;
  let metaData = {};

  function generateStrategy() {
    const title = document.getElementById('movieTitle').value;
    const synopsis = document.getElementById('movieSynopsis').value;
    const cast = document.getElementById('movieCast').value; // Mengambil input pemain
    const rDate = document.getElementById('releaseDate').value;

    if (!title || !synopsis || !rDate) {
      alert('Mohon isi semua field penting (Judul, Sinopsis, dan Tanggal Tayang)!');
      return;
    }

    document.getElementById('loadingSection').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';

    metaData = { title, synopsis, cast, releaseDate: rDate };

    // Simulasi pemrosesan AI / Data Generator
    setTimeout(() => {
      generatedPlan = {
        overview: {
          totalPosts: 24,
          platforms: ['TikTok', 'Instagram', 'X (Twitter)'],
          phases: 3,
          targetAudience: 'Remaja, Dewasa Muda, Penggemar Novel/Sastra Populer'
        },
        phases: [
          { name: "Fase 1: Nostalgia & Pengenalan Karakter", desc: `Menyoroti kembalinya Dilan di tahun 1997 dan dinamika hubungannya dengan Ancika. Memperkenalkan jajaran cast: ${cast || 'Pemain Utama'}.` },
          { name: "Fase 2: Konflik & Ujian Hubungan", desc: "Mulai memicu diskusi publik mengenai datangnya orang ketiga dari masa lalu Dilan." },
          { name: "Fase 3: Menuju Bioskop", desc: "Gencar melakukan hitung mundur, promosi tiket pre-sale, dan konten balik layar (behind the scenes)." }
        ],
        calendar: [
          { week: "Minggu 1", phase: "Fase 1", theme: "Sapaan Karakter", schedule: "Senin & Kamis", platform: "TikTok, IG" },
          { week: "Minggu 2", phase: "Fase 1", theme: "Behind the Scenes", schedule: "Selasa & Jumat", platform: "TikTok" },
          { week: "Minggu 3", phase: "Fase 2", theme: "Teaser Konflik", schedule: "Rabu & Sabtu", platform: "X, IG" },
          { week: "Minggu 4", phase: "Fase 3", theme: "Countdown Bioskop", schedule: "Setiap Hari", platform: "Semua Platform" }
        ],
        captions: [
          `"Tahun 1997 jadi saksi perjalanan baru Dilan dan Ancika. Siap bertemu mereka di bioskop? 🏍️✨ #Dilan1997 #Ancika"`,
          `"Saat masa lalu kembali menyapa, apakah cerita baru akan bertahan? Gimana menurut kalian penampilan ${cast ? cast.split(',')[0] : 'Dilan'} kali ini?"`
        ],
        tips: "Optimalkan konten interaktif berupa kuis atau jajak pendapat (polling) di Instagram Story mengenai kelanjutan kisah cinta masa lalu vs masa depan."
      };

      renderResults();
    }, 1500);
  }

  function renderResults() {
    document.getElementById('loadingSection').style.display = 'none';
    const resSec = document.getElementById('resultsSection');
    resSec.style.display = 'block';

    let phaseHtml = '';
    generatedPlan.phases.forEach(p => {
      phaseHtml += `<p><strong>${p.name}</strong>: ${p.desc}</p>`;
    });

    let calRows = '';
    generatedPlan.calendar.forEach(c => {
      calRows += `<tr><td>${c.week}</td><td>${c.phase}</td><td>${c.theme}</td><td>${c.schedule}</td><td>${c.platform}</td></tr>`;
    });

    let captionHtml = '';
    generatedPlan.captions.forEach(cap => {
      captionHtml += `<blockquote style="background:var(--surface2); padding:12px; margin-bottom:8px; border-left:4px solid var(--primary); font-style:italic;">${cap}</blockquote>`;
    });

    resSec.innerHTML = `
      <div class="output-header">
        <div class="output-title">${metaData.title}</div>
        <p style="color: var(--muted)">Tanggal Rilis: ${metaData.releaseDate}</p>
        <p style="color: var(--muted); font-size: 0.9rem; margin-top: 4px;"><strong>Cast:</strong> ${metaData.cast || '-'}</p>
      </div>
      
      <div class="sec-title">🎯 Ringkasan Strategi</div>
      <p>Target Audiens: ${generatedPlan.overview.targetAudience}</p>
      
      <div class="sec-title">🎬 Fase Kampanye</div>
      ${phaseHtml}
      
      <div class="sec-title">📅 Kalender Konten</div>
      <table>
        <thead>
          <tr><th>Minggu</th><th>Fase</th><th>Tema</th><th>Jadwal</th><th>Platform</th></tr>
        </thead>
        <tbody>${calRows}</tbody>
      </table>
      
      <div class="sec-title">✍️ Contoh Caption Siap Pakai</div>
      ${captionHtml}
      
      <div class="sec-title">💡 Tips Tambahan</div>
      <p>${generatedPlan.tips}</p>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="resetApp()">Reset Form</button>
        <button class="btn" onclick="window.print()">Cetak / Simpan PDF</button>
      </div>
    `;
  }

  function resetApp() {
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('movieTitle').value = '';
    document.getElementById('movieSynopsis').value = '';
    document.getElementById('movieCast').value = ''; // Reset input pemain
    document.getElementById('releaseDate').value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
